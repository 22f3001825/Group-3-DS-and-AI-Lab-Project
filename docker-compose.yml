services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  pipeline:
    build: .
    command: python src/run_pipeline.py
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-mlt_course_bot}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      DISCOURSE_EXPORT_PATH: /input/discourse_export.json
      RECREATE_COLLECTION: ${RECREATE_COLLECTION:-false}
      HF_HOME: /models/huggingface
      FASTEMBED_CACHE_PATH: /models/fastembed
    volumes:
      - ./:/app
      - ../discourse_export.json:/input/discourse_export.json:ro
      - model_cache:/models
    depends_on:
      - qdrant
    restart: "no"

  chatbot:
    build: .
    command: uvicorn src.chatbot_app:app --host 0.0.0.0 --port 8080
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-mlt_course_bot}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      HF_HOME: /models/huggingface
      FASTEMBED_CACHE_PATH: /models/fastembed
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./:/app
      - model_cache:/models
    depends_on:
      pipeline:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  qdrant_storage:
  model_cache:
